name: strict-transition-gate

on:
  pull_request:
  push:
    branches:
      - main
      - feature/**
  workflow_dispatch:

jobs:
  strict-gate-tests:
    runs-on: ubuntu-latest
    env:
      TEXTGRAPHX_RUNTIME_MODE: testing
      TEXTGRAPHX_STRICT_TRANSITION_GATE: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          if [ -f requirements-test.txt ]; then pip install -r requirements-test.txt; fi

      - name: Run strict gate regression suite
        run: |
          python -m pytest \
            tests/test_phase_assertions.py \
            tests/test_diagnostics.py \
            tests/test_orchestration.py \
            tests/test_regression_phases.py \
            tests/test_schema_contract_alignment.py \
            tests/test_milestone7_schema_validation.py \
            tests/test_tlinks_reasoning_runtime.py \
            tests/test_check_quality_gate.py \
            -q

  quality-gate-check:
    runs-on: ubuntu-latest
    # Only compare against committed baseline when the file exists.
    # The job is skipped (not failed) if no baseline has been committed yet.
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          if [ -f requirements-test.txt ]; then pip install -r requirements-test.txt; fi

      - name: Run unit tests for quality gate tool
        run: python -m pytest tests/test_check_quality_gate.py -q

      - name: Check committed baseline exists
        id: baseline-check
        run: |
          if [ -f "out/evaluation/baseline/kg_quality_report.json" ]; then
            echo "baseline_exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "baseline_exists=false" >> "$GITHUB_OUTPUT"
            echo "No committed baseline found — skipping regression comparison." >&2
          fi

      - name: Run current evaluation (offline-safe subset)
        if: steps.baseline-check.outputs.baseline_exists == 'true'
        env:
          TEXTGRAPHX_RUNTIME_MODE: testing
        run: |
          # Offline dry-run: no live Neo4j available in CI; generate a stub report
          # from the check_quality_gate unit-tests harness so the gate script path
          # is exercised end-to-end. Replace this step with a real evaluate_kg_quality
          # run when a CI Neo4j service is added to this workflow.
          python - <<'EOF'
          import json, pathlib
            stub = {
              "overall_quality": 1.0,
              "runtime_diagnostics": {
                "totals": {
                  "tlink_anchor_inconsistent_count": 0,
                  "tlink_missing_anchor_metadata_count": 0,
                  "participation_in_frame_missing_count": 0,
                  "participation_in_mention_missing_count": 0,
                }
              },
            }
          out = pathlib.Path("out/evaluation")
          out.mkdir(parents=True, exist_ok=True)
          (out / "kg_quality_report.json").write_text(json.dumps(stub))
          EOF

      - name: Compare quality against baseline
        if: steps.baseline-check.outputs.baseline_exists == 'true'
        run: |
          python -m textgraphx.tools.check_quality_gate \
            --baseline out/evaluation/baseline/kg_quality_report.json \
            --current  out/evaluation/kg_quality_report.json \
            --tolerance 0.02 \
            --max-participation-in-frame-missing-increase 0 \
            --max-participation-in-mention-missing-increase 0 \
            --max-participation-in-frame-missing 0 \
            --max-participation-in-mention-missing 0 \
            --verbose
