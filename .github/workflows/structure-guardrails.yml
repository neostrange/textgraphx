name: structure-guardrails

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

jobs:
  structure-hygiene:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run structure hygiene checks
        run: bash .github/scripts/verify_structure_hygiene.sh
